<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maso SPARC - Trento DOC</title>
    
    <!-- Tailwind CSS per la grafica -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        pulse: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '.5' } }
                    }
                }
            }
        }
    </script>

    <!-- Regole CSS di Base e Animazioni -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Pinyon+Script&family=Montserrat:wght@200;300;400;600&family=Cinzel:wght@400;500;700&display=swap');
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes thinking { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        body { margin: 0; overflow-x: hidden; }
        
        .label-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1), 0 0 5px rgba(0,0,0,0.1); }
        .paper-ivory { background-color: #fdfbf7; background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3h1v1H1V3zm2-2h1v1H3V1z' fill='%23d4c5b0' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E"); }
        .paper-ice { background-color: #f8fafc; background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h4v4H0V0zm2 2h2v2H2V2z' fill='%23e2e8f0' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E"); }
        .paper-sand { background-color: #f0e6d2; background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3h1v1H1V3zm2-2h1v1H3V1z' fill='%23c2b090' fill-opacity='0.3' fill-rule='evenodd'/%3E%3C/svg%3E"); }
        .stone-dark { background-color: #1a1a1a; background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3h1v1H1V3zm2-2h1v1H3V1z' fill='%23333' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E"); }
        .prytaneum-black { background-color: #0a0a0a; background-image: url("data:image/svg+xml,%3Csvg width='2' height='2' viewBox='0 0 2 2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h1v1H0V0zm1 1h1v1H1V1z' fill='%23111' fill-opacity='1'/%3E%3C/svg%3E"); }
        
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; -webkit-transform-style: preserve-3d; }
        .front-face { -webkit-backface-visibility: hidden; backface-visibility: hidden; transform: rotateY(0deg) translateZ(1px); -webkit-transform: rotateY(0deg) translateZ(1px); z-index: 2; }
        .back-face { -webkit-backface-visibility: hidden; backface-visibility: hidden; transform: rotateY(180deg) translateZ(1px); -webkit-transform: rotateY(180deg) translateZ(1px); z-index: 1; }
        .flip-container.is-flipped .preserve-3d { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }
        
        .thinking-dot { animation: thinking 1.4s infinite ease-in-out both; }
        .thinking-dot:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dot:nth-child(2) { animation-delay: -0.16s; }
    </style>

    <!-- React, ReactDOM e Babel (Per far funzionare il codice nel browser senza installazioni) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#1A1A1A] text-white">
    
    <!-- Contenitore Principale -->
    <div id="root"></div>

    <!-- Script React -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONE SVG CUSTOM (Sostituiscono lucide-react) ---
        const ChevronRight = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>
        );
        const ArrowLeft = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        );
        const Wine = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 22h8"/><path d="M7 10h10"/><path d="M12 15v7"/><path d="M12 15a5 5 0 0 0 5-5c0-2-.5-4-2-8H9c-1.5 4-2 6-2 8a5 5 0 0 0 5 5Z"/></svg>
        );
        const MapPin = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        );
        const FlaskConical = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a2 2 0 0 0 1.78 2.951h10.999a2 2 0 0 0 1.781-2.95l-5.068-10.127A2 2 0 0 1 14 9.527V2"/><path d="M8.5 2h7"/><path d="M14 16H5.3"/></svg>
        );
        const Home = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        );
        const Calendar = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
        );
        const History = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
        );

        // --- DATI VINI E SOMMELIER ---
        const wineDatabase = {
            'alba': {
                name: 'ALBA',
                type: 'Trento DOC',
                price: '25 €',
                color: '#a38f60',
                quote: '"L\'energia verticale del mattino. Freschezza e purezza nel calice."',
                description: <p>È lo spumante più fresco e immediato della casa. Nasce sempre dallo Chardonnay di Pressano, ma esprime il lato più luminoso e dinamico del territorio.</p><p>Brut teso e fragrante, richiama agrumi, fiori bianchi e crosta di pane delicata. La bollicina è fine, il sorso slanciato, pensato per accompagnare aperitivi e momenti conviviali con eleganza e leggerezza.</p>,
                icon: <svg width="80" height="80" viewBox="0 0 100 100"><circle cx="50" cy="65" r="20" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M10 65 H90" stroke="currentColor" stroke-width="1.5"/><path d="M50 35 V20 M30 45 L20 35 M70 45 L80 35" stroke="currentColor" stroke-width="1.5"/></svg>,
                specs: [{ label: 'Uvaggio', value: 'Chardonnay' }, { label: 'Zona', value: 'Pressano' }, { label: 'Affinamento', value: 'Sui lieviti' }, { label: 'Temp. Servizio', value: '6 - 8° C' }]
            },
            'zenit': {
                name: 'ZENIT',
                type: 'Müller Thurgau',
                price: '15 €',
                color: '#64748b',
                quote: '"La precisione aromatica assoluta della montagna a mezzogiorno."',
                description: <p>Prodotto a Ville di Giovo, in Val di Cembra, da vigneti ad alta quota, ZENIT è vinificato <strong>esclusivamente in acciaio</strong> per preservare integrità e verticalità.</p><p>Profumi netti di erbe alpine, agrumi, fiori di campo. In bocca è diretto, minerale, vibrante. L'acciaio esalta la purezza varietale e racconta senza filtri la montagna, con una beva agile e precisa.</p>,
                icon: <svg width="80" height="80" viewBox="0 0 100 100"><circle cx="50" cy="50" r="16" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M50 24 V12 M50 76 V88 M24 50 H12 M88 50 H76 M32 32 L22 22 M68 68 L78 78 M32 68 L22 78 M68 32 L78 22" stroke="currentColor" stroke-width="1.5"/></svg>,
                specs: [{ label: 'Uvaggio', value: 'Müller Thurgau' }, { label: 'Zona', value: 'Ville di Giovo' }, { label: 'Vinificazione', value: '100% Acciaio' }, { label: 'Temp. Servizio', value: '8 - 10° C' }]
            },
            'vespro': {
                name: 'VESPRO',
                type: 'Nosiola',
                price: '22 €',
                color: '#b45309',
                quote: '"L\'ora d\'oro. La morbidezza della tradizione che accoglie la sera."',
                description: <p>Da un ettaro di Nosiola a Pressano nasce un bianco identitario, che unisce rispetto per la storia e sensibilità contemporanea.</p><p>La vinificazione prevede un <strong>breve passaggio in legno</strong>, sufficiente ad arrotondare il sorso senza coprire la delicatezza varietale.</p>,
                icon: <svg width="80" height="80" viewBox="0 0 100 100"><path d="M30 65 A 20 20 0 0 1 70 65" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M10 65 H90" stroke="currentColor" stroke-width="1.5"/><path d="M50 45 V30 M35 50 L22 38 M65 50 L78 38" stroke="currentColor" stroke-width="1.5"/></svg>,
                specs: [{ label: 'Uvaggio', value: 'Nosiola 100%' }, { label: 'Zona', value: 'Pressano' }, { label: 'Affinamento', value: 'Breve in legno' }, { label: 'Temp. Servizio', value: '10 - 12° C' }]
            },
            'crepuscolo': {
                name: 'CREPUSCOLO',
                type: 'Pinot Nero Riserva',
                price: '35 €',
                color: '#8a3324',
                quote: '"L\'eleganza del Pinot Nero nel mistero delle prime ombre."',
                description: <p>Dalle vigne di Ville di Giovo nasce un Pinot Nero di montagna, affinato <strong>3 anni in barriques</strong>.</p><p>Le escursioni termiche donano tensione; l'affinamento scolpisce struttura. Profumi di piccoli frutti rossi, spezie e note tostate.</p>,
                icon: <svg width="80" height="80" viewBox="0 0 100 100"><path d="M45 30 A 22 22 0 1 0 72 55 A 26 26 0 0 1 45 30 Z" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="25" cy="40" r="1.5" fill="currentColor"/><circle cx="80" cy="30" r="1" fill="currentColor"/><circle cx="55" cy="75" r="1.5" fill="currentColor"/></svg>,
                specs: [{ label: 'Uvaggio', value: 'Pinot Nero' }, { label: 'Zona', value: 'Ville di Giovo' }, { label: 'Affinamento', value: '3 anni in Barriques' }, { label: 'Temp. Servizio', value: '16 - 18° C' }]
            },
            'prytaneum': {
                name: 'PRYTANEUM',
                type: 'Trento DOC Riserva Extra Brut',
                price: '80 €',
                color: '#c5a059',
                quote: '"Il centro pulsante, il focolare che non si spegne mai."',
                description: <p>PRYTANEUM è la sintesi di tutto il ciclo. Base Chardonnay, è il vino di punta dell'azienda: una <strong>Trento DOC Riserva Extra Brut</strong> che custodisce la luce per anni prima di svelarsi.</p><p>È struttura e tensione, profondità e precisione. Oro puro, tempo e saggezza.</p>,
                icon: <svg width="80" height="80" viewBox="0 0 100 100"><path d="M50 20 Q 75 55 50 85 Q 25 55 50 20 Z" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="50" cy="65" r="3.5" fill="currentColor"/><path d="M50 35 V55" stroke="currentColor" stroke-width="1.5"/><circle cx="50" cy="50" r="28" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2 4"/></svg>,
                specs: [{ label: 'Uvaggio', value: 'Chardonnay' }, { label: 'Zona', value: 'Pressano' }, { label: 'Tipologia', value: 'Riserva Extra Brut' }, { label: 'Longevità', value: 'Oltre 10 anni' }]
            }
        };

        const sommelierRules = {
            'alba': { keywords: ['aperitivo', 'crudo', 'sushi', 'fritto', 'salumi', 'leggero', 'fresco', 'pizza', 'pesce', 'tramonto', 'amici'], reason: "Per iniziare al meglio, la freschezza e la bollicina tesa di ALBA sono l'abbinamento ideale che pulisce il palato." },
            'zenit': { keywords: ['verdure', 'asparagi', 'speziato', 'asiatico', 'erbe', 'lago', 'vegetariano', 'trota', 'curry'], reason: "I profumi di erbe alpine di ZENIT esaltano perfettamente piatti aromatici, verdure e pesce delicato." },
            'vespro': { keywords: ['pasta', 'spaghetti', 'carne bianca', 'pollo', 'funghi', 'primo', 'tradizione', 'risotto', 'maiale'], reason: "La morbidezza della Nosiola VESPRO abbraccia a meraviglia primi piatti e carni bianche." },
            'crepuscolo': { keywords: ['carne', 'rossa', 'bistecca', 'fiorentina', 'arrosto', 'selvaggina', 'grigliata', 'ragù', 'inverno'], reason: "Per carni rosse o piatti intensi, l'eleganza e la profondità del Pinot Nero CREPUSCOLO sono imprescindibili." },
            'prytaneum': { keywords: ['crostacei', 'ostriche', 'speciale', 'anniversario', 'festa', 'complesso', 'importante', 'matrimonio'], reason: "Di fronte a un momento speciale, la struttura maestosa di PRYTANEUM domina la scena con eleganza assoluta." }
        };

        const App = () => {
            const [view, setView] = useState('landing');
            const [activeSection, setActiveSection] = useState(null);
            
            // Stati
            const [selectedWine, setSelectedWine] = useState(null);
            const [sommelierInput, setSommelierInput] = useState('');
            const [isThinking, setIsThinking] = useState(false);
            const [sommelierResult, setSommelierResult] = useState(null);
            const [showToast, setShowToast] = useState(false);
            const sommelierResultRef = useRef(null);

            // Logo Maso SPARC
            const MasoSparcLogo = ({ className = "w-16 h-16", color = "currentColor" }) => (
                <svg viewBox="0 0 120 100" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 50L60 30L100 50" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M35 50H85" stroke={color} strokeWidth="1" strokeDasharray="2 2" opacity="0.5"/>
                <circle cx="60" cy="15" r="2" fill={color} />
                <circle cx="48" cy="22" r="1.5" fill={color} opacity="0.8" />
                <circle cx="72" cy="22" r="1.5" fill={color} opacity="0.8" />
                <circle cx="40" cy="35" r="1" fill={color} opacity="0.6" />
                <circle cx="80" cy="35" r="1" fill={color} opacity="0.6" />
                <circle cx="54" cy="28" r="1" fill={color} opacity="0.4" />
                <circle cx="66" cy="28" r="1" fill={color} opacity="0.4" />
                </svg>
            );

            const mosaicTiles = [
                { id: 'collezione', title: 'Collezione', subtitle: 'Le linee dei vini', size: 'md:col-span-2 md:row-span-2', image: 'https://images.unsplash.com/photo-1585553616435-2dc0a54e271d?auto=format&fit=crop&q=80', icon: <Wine className="mb-4 text-[#BFA872]" size={32} /> },
                { id: 'agriturismo', title: 'Agriturismo', subtitle: 'Le nostre camere', size: 'md:col-span-1 md:row-span-2', image: 'https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&q=80', icon: <Home className="mb-4 text-[#BFA872]" size={32} /> },
                { id: 'degustazioni', title: 'Degustazioni', subtitle: 'Esperienze in cantina', size: 'md:col-span-1 md:row-span-1', image: 'https://images.unsplash.com/photo-1506377247377-2a5b3b0ca7df?auto=format&fit=crop&q=80', icon: <Wine className="mb-4 text-[#BFA872]" size={24} /> },
                { id: 'visite', title: 'Visite e Prenotazioni', subtitle: 'Scopri il maso', size: 'md:col-span-1 md:row-span-1', image: 'https://images.unsplash.com/photo-1590494165264-1ebe3602eb80?auto=format&fit=crop&q=80', icon: <Calendar className="mb-4 text-[#BFA872]" size={24} /> },
                { id: 'storia', title: 'Storia', subtitle: 'Le nostre radici', size: 'md:col-span-1 md:row-span-1', image: 'https://images.unsplash.com/photo-1553192221-b39a81826b0d?auto=format&fit=crop&q=80', icon: <History className="mb-4 text-[#BFA872]" size={24} /> },
                { id: 'territorio', title: 'Territorio', subtitle: 'Pressano e il suo clima', size: 'md:col-span-2 md:row-span-1', image: 'https://images.unsplash.com/photo-1423483641154-5411ec9c0ddf?auto=format&fit=crop&q=80', icon: <MapPin className="mb-4 text-[#BFA872]" size={24} /> }
            ];

            const handleAskSommelier = () => {
                if (!sommelierInput.trim()) return;
                setSommelierResult(null);
                setIsThinking(true);

                setTimeout(() => {
                    let bestMatch = 'alba';
                    let maxScore = 0;
                    const inputLower = sommelierInput.toLowerCase();

                    for (const [wineId, data] of Object.entries(sommelierRules)) {
                        let currentScore = 0;
                        data.keywords.forEach(keyword => {
                            if (inputLower.includes(keyword)) currentScore += keyword.length;
                        });
                        if (currentScore > maxScore) { maxScore = currentScore; bestMatch = wineId; }
                    }

                    let reason = sommelierRules[bestMatch].reason;
                    if (maxScore === 0) {
                        bestMatch = 'prytaneum';
                        reason = "Per una richiesta così particolare e libera, andiamo sul sicuro: l'eccellenza e la longevità di PRYTANEUM sapranno accompagnare il tuo momento con maestria.";
                    }

                    setSommelierResult({ wineId: bestMatch, reason });
                    setIsThinking(false);
                    setTimeout(() => sommelierResultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
                    setSommelierInput('');
                }, 1500);
            };

            const triggerToast = () => {
                setShowToast(true);
                setTimeout(() => setShowToast(false), 3500);
            };

            // 1. LANDING PAGE
            if (view === 'landing') {
                return (
                <div className="relative h-screen w-full overflow-hidden bg-[#1A1A1A] flex flex-col items-center justify-center selection:bg-[#BFA872]">
                    <div className="absolute inset-0 bg-cover bg-center opacity-60 mix-blend-overlay transform scale-105 animate-[pulse_20s_ease-in-out_infinite]" style={{ backgroundImage: "url('https://images.unsplash.com/photo-1464039397811-476f652a343b?auto=format&fit=crop&q=80')" }}></div>
                    <div className="absolute inset-0 bg-gradient-to-t from-[#1A1A1A] via-transparent to-[#1A1A1A]/50"></div>
                    <div className="relative z-10 flex flex-col items-center text-center animate-[fadeIn_2s_ease-out]">
                    <MasoSparcLogo className="w-24 h-24 text-[#BFA872] mb-8 drop-shadow-2xl" color="#BFA872" />
                    <h1 className="text-7xl md:text-9xl font-serif text-white tracking-tighter drop-shadow-2xl mb-2">Maso <span className="italic font-light text-[#BFA872]">SPARC</span></h1>
                    <p className="text-[#BFA872] text-[10px] uppercase tracking-[0.8em] mb-20 font-bold drop-shadow-md">PRESSANO - TRENTO DOC & MORE...</p>
                    <button onClick={() => setView('mosaic')} className="group flex flex-col items-center gap-4 cursor-pointer">
                        <span className="text-white text-xs uppercase tracking-[0.4em] font-light group-hover:text-[#BFA872] transition-colors">Entra</span>
                        <div className="w-px h-12 bg-white/30 group-hover:bg-[#BFA872] group-hover:h-16 transition-all duration-300"></div>
                    </button>
                    </div>
                </div>
                );
            }

            // 2. VISTA MOSAICO
            if (view === 'mosaic') {
                return (
                <div className="min-h-screen bg-[#1A1A1A] p-4 md:p-8 animate-[fadeIn_0.8s_ease-out]">
                    <header className="flex justify-between items-center mb-8 px-4">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => setView('landing')}>
                        <MasoSparcLogo className="w-10 h-10 text-[#BFA872]" color="#BFA872" />
                        <span className="text-xl font-serif tracking-[0.2em] uppercase text-white">SPARC</span>
                        </div>
                        <span className="text-[#BFA872] text-[10px] uppercase tracking-[0.4em] font-bold">Esplora il Maso</span>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 auto-rows-[250px] max-w-7xl mx-auto">
                        {mosaicTiles.map((tile) => (
                        <div key={tile.id} onClick={() => { setActiveSection(tile); setView('section'); }} className={relative group cursor-pointer overflow-hidden rounded-sm bg-stone-900 ${tile.size}}>
                            <div className="absolute inset-0 bg-cover bg-center transition-transform duration-1000 group-hover:scale-110 opacity-60 group-hover:opacity-40" style={{ backgroundImage: url(${tile.image}) }}></div>
                            <div className="absolute inset-0 bg-gradient-to-t from-[#1A1A1A] via-[#1A1A1A]/20 to-transparent"></div>
                            <div className="absolute inset-0 p-8 flex flex-col justify-end transition-transform duration-500 group-hover:-translate-y-2">
                            <div className="transform translate-y-8 group-hover:translate-y-0 transition-all duration-500 opacity-0 group-hover:opacity-100">{tile.icon}</div>
                            <h3 className="text-3xl font-serif text-white mb-2">{tile.title}</h3>
                            <div className="flex items-center justify-between">
                                <p className="text-[10px] uppercase tracking-widest text-[#BFA872] font-bold">{tile.subtitle}</p>

                                    <div className="p-4 bg-stone-900 text-white rounded-sm">
                                    <h4 className="text-[10px] uppercase tracking-widest text-[#BFA872] font-bold mb-2">Nota Normativa OGM</h4>
                                    <p className="text-xs font-light opacity-80 leading-relaxed">Per esaltare i composti tiolici tipici di queste colline, si potrebbero impiegare lieviti ingegnerizzati tramite <strong>CRISPR/Cas9</strong> per silenziare il gene URE2 (aumentando l'assimilazione di azoto). Tuttavia, l'uso di tali lieviti modificherebbe lo status del prodotto, classificandolo legalmente come <strong>OGM</strong> nell'Unione Europea, rendendolo inadatto alla denominazione Trento DOC. Pertanto, il Maso SPARC utilizza esclusivamente lieviti selezionati non-OGM.</p>
                                    </div>
                                </div>
                                )}
                            </div>
                        </div>
                    </>
                    )}

                    {/* OVERLAY DETTAGLIO VINO (Il codice che si era tagliato!) */}
                    {selectedWine && (
                        <div className="fixed inset-0 z-[60] bg-[#fdfbf7] overflow-y-auto animate-[fadeIn_0.5s_ease-out]">
                            <div className="sticky top-0 w-full px-6 py-4 flex justify-between items-center bg-[#fdfbf7]/90 backdrop-blur-md border-b border-gray-200 z-10">
                                <button onClick={() => setSelectedWine(null)} className="flex items-center space-x-2 text-gray-500 hover:text-gray-900 transition-colors group">
                                    <svg className="w-6 h-6 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                                    <span className="font-['Montserrat'] text-xs tracking-widest uppercase font-bold">Torna alla Collezione</span>
                                </button>
                                <div className="font-['Pinyon_Script'] text-3xl text-gray-300">Maso Sparc</div>
                                <div className="w-24"></div>
                            </div>

                            <div className="max-w-[1200px] mx-auto px-6 py-12 md:py-20 flex flex-col md:flex-row gap-12 lg:gap-24 items-stretch">
                                {/* Lato Sinistro: Grafica e Specifiche */}
                                <div className="md:w-4/12 bg-white shadow-md border border-gray-100 p-2 relative overflow-hidden flex flex-col group">
                                    <div className="border border-gray-100 h-full w-full p-8 md:p-10 flex flex-col items-center justify-center relative">
                                        <div className="absolute inset-0 opacity-[0.03] transition-colors duration-1000" style={{ backgroundColor: wineDatabase[selectedWine].color }}></div>
                                        <div className="relative z-10 w-full flex flex-col items-center">
                                            <div className="mb-8 transition-transform duration-700 group-hover:scale-110" style={{ color: wineDatabase[selectedWine].color }} dangerouslySetInnerHTML={{ __html: wineDatabase[selectedWine].icon }}></div>
                                            <h3 className="font-['Cinzel'] text-[10px] tracking-[0.4em] uppercase text-gray-400 mb-6 pb-4 border-b border-gray-200 w-16 mx-auto text-center">Identità</h3>
                                            <div className="w-full flex flex-col items-center">
                                                {wineDatabase[selectedWine].specs.map((spec, index) => (
                                                    <React.Fragment key={index}>
                                                        <div className="flex flex-col items-center text-center w-full">
                                                            <span className="font-['Montserrat'] text-[8px] uppercase tracking-[0.3em] text-gray-400 mb-2">{spec.label}</span>
                                                            <span className="font-['Cormorant_Garamond'] text-lg text-gray-800 italic leading-none">{spec.value}</span>
                                                        </div>
                                                        {index < wineDatabase[selectedWine].specs.length - 1 && <div className="w-4 h-px bg-gray-200 my-5"></div>}
                                                    </React.Fragment>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                {/* Lato Destro: Testi, Prezzo e Carrello */}
                                <div className="md:w-8/12 flex flex-col justify-center">
                                    <div className="mb-8">
                                        <h1 className="text-5xl md:text-6xl font-serif text-gray-900 mb-2 font-bold uppercase tracking-wider">{wineDatabase[selectedWine].name}</h1>
                                        <h2 className="text-xl font-['Cinzel'] text-gray-500 pb-6 border-b border-gray-200 tracking-[0.2em] uppercase">{wineDatabase[selectedWine].type}</h2>
                                    </div>
                                    <p className="text-2xl font-['Cormorant_Garamond'] italic text-gray-800 mb-10 border-l-4 pl-6 py-1 leading-snug transition-colors duration-500" style={{ borderColor: wineDatabase[selectedWine].color }}>
                                        {wineDatabase[selectedWine].quote}
                                    </p>
                                    <div className="text-gray-600 leading-relaxed font-light text-lg font-['Cormorant_Garamond'] space-y-5 mb-14" dangerouslySetInnerHTML={{ __html: wineDatabase[selectedWine].description }}></div>
                                    
                                    <div className="mt-auto flex flex-col sm:flex-row items-center justify-between bg-white p-6 md:p-8 border border-gray-100 shadow-sm">
                                        <div className="text-center sm:text-left mb-4 sm:mb-0">
                                            <p className="text-[10px] text-gray-400 uppercase tracking-widest mb-1 font-bold">Prezzo a bottiglia</p>
                                            <p className="text-4xl font-serif text-gray-900 font-bold">{wineDatabase[selectedWine].price}</p>
                                        </div>
                                        <button 
                                            onClick={triggerToast} 
                                            className="w-full sm:w-auto bg-gray-900 text-white px-10 py-4 text-xs tracking-widest uppercase transition-colors duration-300 font-bold shadow-lg"
                                            onMouseOver={(e) => { e.currentTarget.style.backgroundColor = wineDatabase[selectedWine].color; }}
                                            onMouseOut={(e) => { e.currentTarget.style.backgroundColor = ''; }}
                                        >
                                            Aggiungi al Carrello
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Toast Notification Esaurito */}
                            <div className={fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-8 py-5 shadow-2xl z-[100] flex items-center space-x-4 transition-all duration-500 ${showToast ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8 pointer-events-none'}}>
                                <svg className="w-6 h-6 text-[#d4af37]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                <span className="font-['Montserrat'] text-[11px] tracking-[0.2em] uppercase font-bold mt-0.5">Prodotto esaurito perché troppo buono</span>
                            </div>
                        </div>
                    )}
                </div>
                );
            }

            return null; // Fallback generico
        };

        // Renderizza l'app dentro il div con id "root"
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
